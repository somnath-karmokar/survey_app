<!-- templates/surveys/includes/advertisement_modal.html -->
<div class="modal fade" id="advertisementModal" tabindex="-1" aria-labelledby="advertisementModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="advertisementModalLabel">Advertisement</h5>
                <!-- Hidden until ad is clicked -->
                <button type="button" id="ad-modal-close-btn" class="btn-close d-none" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center">
                <div style="width:100%; min-width:300px; min-height:250px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                    <i class="fas fa-bullhorn fa-3x text-secondary mb-3"></i>
                    <h5 class="text-muted fw-semibold">Ads Coming Soon...</h5>
                    <p class="text-muted small mt-2">Advertisement space will be available here shortly.</p>
                </div>
                <p id="ad-modal-hint" class="text-muted mt-3 small d-none">
                    <i class="fas fa-arrow-up me-1"></i> Click on the advertisement above to unlock the Continue button
                </p>
            </div>
            <div class="modal-footer justify-content-between align-items-center">
                <span id="ad-modal-status" class="small text-muted"></span>
                <!-- Hidden until ad is clicked -->
                <button type="button" id="ad-modal-continue-btn" class="btn btn-primary d-none" data-bs-dismiss="modal">
                    <i class="fas fa-arrow-right me-1"></i>Continue Survey
                </button>
            </div>
        </div>
    </div>
</div>
